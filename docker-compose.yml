services:
  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - database
    ports:
      - "8000:8000"

  database:
    image: mysql:8.0
    restart: always
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql

  frontend:
    image: nginx:latest
    volumes:
        - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        - ./frontend:/app
        - /app/node_modules
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  mysql_data: